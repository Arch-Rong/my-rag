# MedRAG 本地基础设施：PostgreSQL + pgvector + MinIO
#
# 说明：
#   - pgvector：业务表 + 向量都在 Postgres（init/01-pgvector.sql）
#   - MinIO：用户上传的 PDF / MD 源文件（S3 兼容 API）
#
# 用法（仓库根目录）：
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml ps
#   MinIO 控制台：http://127.0.0.1:9001 （medrag / medrag_dev）
#   首次使用：在控制台新建 bucket「medrag-uploads」（或由后端首次上传时自动创建）

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medrag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medrag
      POSTGRES_PASSWORD: medrag
      POSTGRES_DB: medrag
    ports:
      - '5432:5432'
    volumes:
      - medrag_pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medrag -d medrag']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: medrag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: medrag
      MINIO_ROOT_PASSWORD: medrag_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - medrag_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  medrag_pg_data:
  medrag_minio_data:
